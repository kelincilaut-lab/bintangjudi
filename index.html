    .nav-container {

    .button-container {

      gap: 20px;

      max-width: 600px;
      margin: 0 auto;
      background: rgba(0,0,0,0.3);
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }

    .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: var(--button-padding-mobile);
      width: var(--button-width-mobile);
      border: none;
      border-radius: 35px;
      font-size: var(--font-size-mobile);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #fff;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .login-btn {
      background: linear-gradient(45deg, #00abfa, #dfee0e);
      box-shadow: 0 0 20px rgba(66, 133, 244, 0.3);
    }

        .apk-btn {
      background: linear-gradient(45deg, #00abfa, #dfee0e);
      box-shadow: 0 0 20px rgba(66, 133, 244, 0.3);
    }

    .daftar-btn {
      background: linear-gradient(45deg, #00abfa, #dfee0e);
      box-shadow: 0 0 20px rgba(52, 168, 83, 0.3);
    }

        .vip-btn {
      background: linear-gradient(45deg, #00abfa, #dfee0e);
      box-shadow: 0 0 20px rgba(52, 168, 83, 0.3);
    }

    .btn::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      border-radius: 35px;
      background: linear-gradient(45deg, #00abfa, #00abfa, #00abfa);
      z-index: -1;
      animation: glowingBorder 3s linear infinite;
    }

    .btn-content {
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 1;
    }

    .btn-icon {
      width: 24px;
      height: 24px;
      fill: currentColor;
      filter: drop-shadow(0 0 4px rgba(255,255,255,0.3));
    }

    .logo-icon-left,
    .logo-icon-right {
      width: 28px;
      height: 28px;
      position: absolute;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.6));
    }

    .logo-icon-left {
      left: 20px;
      animation: floatLeft 3s ease-in-out infinite;
    }

    .logo-icon-right {
      right: 20px;
      animation: floatRight 3s ease-in-out infinite;
    }

    @keyframes glowingBorder {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    @keyframes floatLeft {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-6px) rotate(10deg); }
    }

    @keyframes floatRight {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-6px) rotate(-10deg); }
    }

    @keyframes blink-caret {

    @media (max-width: 480px) {

    @media (min-width: 481px) and (max-width: 768px) {

    @media (min-width: 769px) {

    @media (hover: hover) {

    }

    @media (prefers-reduced-motion: reduce) {
      .btn::before,
      .logo-icon-left,
      .logo-icon-right {
        animation: none;
      }
    }
  </style>
</head>
